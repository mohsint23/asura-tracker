name = "asura-tracker"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "asura-tracker-db"
database_id = "local"

[vars]
ASURA_API_BASE = "https://api.asurascans.com"

# NOTIFICATION_EMAIL is loaded from .dev.vars locally
# and set via `wrangler secret put` in production

[triggers]
crons = ["0 * * * *"]
